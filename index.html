<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DeFiNomad</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      color: #f5f3ff;
      background: #07050d;
      text-align: center;
    }

    main {
      width: min(680px, 100%);
      padding: 32px 20px;
    }

    h1 {
      margin: 0;
      font-size: 64px;
    }

    p {
      margin: 16px 0 28px;
      font-size: 22px;
      color: #c7c2d8;
    }

    a {
      display: inline-block;
      margin: 6px;
      padding: 12px 18px;
      border: 1px solid #a855f7;
      border-radius: 8px;
      color: #f5f3ff;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      background: #a855f7;
      color: #07050d;
    }

    section {
      margin-top: 48px;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 32px;
      color: #a855f7;
    }

    .project {
      margin: 12px auto;
      padding: 16px;
      max-width: 420px;
      border: 1px solid #2b2438;
      border-radius: 8px;
      background: #100c18;
    }

    .project h3 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .project p {
      margin: 0;
      font-size: 16px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 44px;
      }

      p {
        font-size: 18px;
      }

      a {
        display: block;
        margin: 12px auto;
        width: min(260px, 100%);
        box-sizing: border-box;
      }

      h2 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>DeFiNomad</h1>
    <p>Web3 Developer in Progress</p>
    <a href="https://x.com/DefinomadV2">X (Twitter)</a>
    <a href="https://www.github.com/youngturk941">GitHub</a>

    <section>
      <h2>Projects</h2>
      <div class="project">
        <h3>Portfolio Website</h3>
        <p>A simple personal site built with plain HTML and CSS.</p>
      </div>
      <div class="project">
        <h3>Web3 Experiments</h3>
        <p>Learning, building, and exploring decentralized apps.</p>
      </div>
    </section>
  </main>
</body>
</html>
